<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plugin</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
    }

    #wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .drop-zone {
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
      border: 2px dashed #037171;
      width: 50%;
      height: 50%;
    }

    #selection-pane {
      display: none;
      justify-content: space-evenly;
      align-items: center;
      box-sizing: border-box;
      position: absolute;
      bottom: 72px;
      z-index: 2;
      width: 100%;
      height: 72px;
      background-color: #fff;
      border-top: 1px solid #e5e5e5;
    }

    .selection-pane-item {
      display: none;
      justify-content: space-evenly;
      align-items: center;
      box-sizing: border-box;
      position: fixed;
      bottom: 72px;
      z-index: 2;
      width: 100%;
      height: 72px;
      background-color: #fff;
      box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.3);
    }

    #steps-pane {
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      position: fixed;
      padding-left: 20px;
      padding-right: 20px;
      left: 0;
      bottom: 0;
      z-index: 2;
      width: 100%;
      height: 72px;
      background-color: #fff;
      border-top: 1px solid #e5e5e5;
    }

    .step-item {
      display: none;
      justify-content: center;
      align-items: center;
      position: absolute;
      flex-direction: column;
      gap: 20px;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    /* radio button */
    :root {
      --form-control-color: rebeccapurple;
    }

    *,
    *:before,
    *:after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    form {
      display: grid;
      place-content: center;
      min-height: 100vh;
    }

    .form-control {
      font-family: system-ui, sans-serif;
      font-size: 2rem;
      font-weight: bold;
      line-height: 1.1;
      display: grid;
      grid-template-columns: 1em auto;
      gap: 0.5em;
    }

    .form-control+.form-control {
      margin-top: 1em;
    }

    .form-control:focus-within {
      color: var(--form-control-color);
    }

    input[type=radio] {
      /* Add if not using autoprefixer */
      -webkit-appearance: none;
      /* Remove most all native input styles */
      -moz-appearance: none;
      appearance: none;
      /* For iOS < 15 */
      background-color: var(--form-background);
      /* Not removed via appearance */
      margin: 0;
      font: inherit;
      color: currentColor;
      width: 1.15em;
      height: 1.15em;
      border: 0.15em solid currentColor;
      border-radius: 50%;
      transform: translateY(-0.075em);
      display: grid;
      place-content: center;
    }

    input[type=radio]::before {
      content: "";
      width: 0.65em;
      height: 0.65em;
      border-radius: 50%;
      transform: scale(0);
      transition: 120ms transform ease-in-out;
      box-shadow: inset 1em 1em var(--form-control-color);
      /* Windows High Contrast Mode */
      background-color: CanvasText;
    }

    input[type=radio]:checked::before {
      transform: scale(1);
    }

    input[type=radio]:focus {
      outline: max(2px, 0.15em) solid currentColor;
      outline-offset: max(2px, 0.15em);
    }

    /* end radio button */
    button {
      background-color: #000;
      font-size: 15px;
      padding: 12px 24px;
      border-radius: 3px;
      color: #fff;
      fill: #fff;
      text-align: center;
      transition: all .3s;
      outline: none;
      border: none;
      cursor: pointer;
    }

    button:disabled,
    button[disabled] {
      opacity: 0.7;
    }

    .custom-file-upload {
      border: 1px solid #ccc;
      display: inline-block;
      padding: 6px 12px;
      cursor: pointer;
    }

    .environment-list {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      width:100%;
      height:auto;
    }

    .environment-item {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 300px;
      height: 100%;
      max-height: 200px;
      font-size: 100px;
      font-weight: bolder;
      color: #037171;
      border: 1px solid #000;
      border-radius: 3px;
      padding: 10px;
    }

    .environment-item:hover {
      opacity: 0.7;
      border: 1px solid #037171;
      cursor: pointer;
    }

    .environment-image {
      height: 100%;
      width: 100%;
      object-fit: contain;
    }

    .frame-list {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      width:100%;
      height:auto;
    }

    .frame-item {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 70px;
      font-size: 100px;
      font-weight: bolder;
      color: #037171;
      padding: 10px;
    }

    .frame-item:hover {
      opacity: 0.7;
      cursor: pointer;
    }

    .frame-image {
      height: 100%;
      width: 100%;
      object-fit: contain;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css" type="text/css" />
</head>

<body>
  <div id="wrapper">
    <!-- canvas is always active and it's step 3 -->
    <canvas id="canvas"></canvas>
    <!-- steps -->
    <div class="step-item" id="select-environment" style="background-color: #fff;" step-index="1">
      <h1 style="font-family: system-ui; margin-bottom:20px; color:#037171;">Select Environment</h1>
      <div id="environment-list" class="environment-list">
        <label class="environment-item" style="text-align:center;">
          <input style="display:none;" type="file" id="wall-file-upload" accept="image/png, image/jpeg" />
          &#x2b;
        </label>
      </div>
    </div>
    <div class="step-item" id="select-artwork" step-index="2">
      <h1 style="font-family: system-ui; margin-bottom:20px; color:#037171;">Upload Artwork</h1>
      <div class="environment-list">
        <label class="environment-item" style="text-align:center; width:50%; max-width:300px; height:auto;">
          <input style="display:none;" type="file" id="image-file-upload" accept="image/png, image/jpeg" />
          &#x2b;
        </label>
      </div>
    </div>
    <!--
    <div class="step-item" step-index="2">
      <h1>Upload artwork</h1>
      <div id="image-drop-zone" class="drop-zone">
        <input type="file" id="image-file-upload" accept="image/png, image/jpeg" />
      </div>
    </div>
  -->
    <!-- active selection pane -->
    <div class="selection-pane-item" type="artwork">
      <div id="artwork-list" class="frame-list">
        <label for="artwork-file-upload" class="frame-item" style="text-align:center;">
          <input style="display:none;" type="file" id="artwork-file-upload" accept="image/png, image/jpeg" />
          &#x2b;
        </label>
      </div>
    </div>
    <div class="selection-pane-item" type="frame">
      <div id="frame-list" class="frame-list">
        <label for="frame-file-upload" class="frame-item" style="text-align:center;">
          <input style="display:none;" type="file" id="frame-file-upload" accept="image/png, image/jpeg" />
          &#x2b;
        </label>
      </div>
    </div>
    <div class="selection-pane-item" type="pass">
      <div id="pass-list" class="frame-list">
      </div>
    </div>
    <div class="selection-pane-item" style="justify-content:center; gap:20px;" id="selection-background-pane" type="background">
      <button id="add-artwork">Add New Artwork</button>
      <div>
        <button id="change-wall-size">Set wall scale</button>
      </div>
    </div>
    <div class="selection-pane-item" id="selection-scale-pane" type="scale">
      <label for="wall-size" style="display:inline-flex; gap:10px; margin-right: 10px;">Length <input id="wall-size"
        type="number" min="0" value="300" style="width:50px; text-align:center;" />cm</label>
    </div>
    <!-- steps pane -->
    <div id="steps-pane">
      <div><span id="steps-counter"></span></div>
      <div><button id="next-step" style="background-color: #037171;">Next</button></div>
    </div>
  </div>
  <script src="paper.js"></script>
  <script src="frame.js"></script>
  <script src="artwork.js"></script>
  <script src="main.js"></script>
</body>

</html>
