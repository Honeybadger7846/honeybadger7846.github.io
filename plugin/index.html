<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Plugin</title>
  <link rel="stylesheet" href="style.css" type="text/css" />
</head>

<body>
  <div id="app-container">
    <!-- steps -->
    <div id="steps-container">
      <div id="toolbox-top" class="toolbox">
        <input type="text" id="painting-name-options" style="text-align:center; min-width: 10px; width:auto; max-width:100px; height:30px; font-size:16px; border: none;
        outline: none; background:transparent; color:#fff;" />
        <label id="rename-painting-focus" class="toolbox-item" style=" display:flex; height:30px; width:30px;">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 512 512">
            <path fill="currentColor"
              d="M362.7 19.3L314.3 67.7 444.3 197.7l48.4-48.4c25-25 25-65.5 0-90.5L453.3 19.3c-25-25-65.5-25-90.5 0zm-71 71L58.6 323.5c-10.4 10.4-18 23.3-22.2 37.4L1 481.2C-1.5 489.7 .8 498.8 7 505s15.3 8.5 23.7 6.1l120.3-35.4c14.1-4.2 27-11.8 37.4-22.2L421.7 220.3 291.7 90.3z" />
          </svg>
        </label>
        <label class="toolbox-item" style=" display:flex; height:30px; width:30px;">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 512 512">
            <path fill="currentColor"
              d="M288 448H64V224h64V160H64c-35.3 0-64 28.7-64 64V448c0 35.3 28.7 64 64 64H288c35.3 0 64-28.7 64-64V384H288v64zm-64-96H448c35.3 0 64-28.7 64-64V64c0-35.3-28.7-64-64-64H224c-35.3 0-64 28.7-64 64V288c0 35.3 28.7 64 64 64z" />
          </svg>
        </label>
        <label id="remove-painting" class="toolbox-item" style=" display:flex; height:30px; width:30px;">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 448 512">
            <path fill="currentColor"
              d="M135.2 17.7L128 32H32C14.3 32 0 46.3 0 64S14.3 96 32 96H416c17.7 0 32-14.3 32-32s-14.3-32-32-32H320l-7.2-14.3C307.4 6.8 296.3 0 284.2 0H163.8c-12.1 0-23.2 6.8-28.6 17.7zM416 128H32L53.2 467c1.6 25.3 22.6 45 47.9 45H346.9c25.3 0 46.3-19.7 47.9-45L416 128z" />
          </svg>
        </label>
      </div>
      <div id="toolbox-bottom" class="toolbox" style="width:auto; user-select:none;">
      </div>
      <!-- canvas step -->
      <label id="undo" class="selection-item selection-item-add"
        style=" display:none; height:40px; min-width:40px; position:absolute; z-index:3; top:20px; left:20px;">
        <svg height="30" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <path fill="currentColor"
            d="M48.5 224H40c-13.3 0-24-10.7-24-24V72c0-9.7 5.8-18.5 14.8-22.2s19.3-1.7 26.2 5.2L98.6 96.6c87.6-86.5 228.7-86.2 315.8 1c87.5 87.5 87.5 229.3 0 316.8s-229.3 87.5-316.8 0c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0c62.5 62.5 163.8 62.5 226.3 0s62.5-163.8 0-226.3c-62.2-62.2-162.7-62.5-225.3-1L185 183c6.9 6.9 8.9 17.2 5.2 26.2s-12.5 14.8-22.2 14.8H48.5z" />
        </svg>
      </label>
      <label id="redo" class="selection-item selection-item-add"
        style=" display:none; height:40px; min-width:40px; position:absolute; z-index:3; top:20px; left:80px;">
        <svg height="30" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <path fill="currentColor"
            d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z" />
        </svg>
      </label>
      <label id="fit-to-screen" class="selection-item selection-item-add"
        style=" display:none; height:40px; min-width:40px; position:absolute; z-index:3; top:20px; right:20px;">
        <svg height="30" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
          <path fill="currentColor"
            d="M32 32C14.3 32 0 46.3 0 64v96c0 17.7 14.3 32 32 32s32-14.3 32-32V96h64c17.7 0 32-14.3 32-32s-14.3-32-32-32H32zM64 352c0-17.7-14.3-32-32-32s-32 14.3-32 32v96c0 17.7 14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H64V352zM320 32c-17.7 0-32 14.3-32 32s14.3 32 32 32h64v64c0 17.7 14.3 32 32 32s32-14.3 32-32V64c0-17.7-14.3-32-32-32H320zM448 352c0-17.7-14.3-32-32-32s-32 14.3-32 32v64H320c-17.7 0-32 14.3-32 32s14.3 32 32 32h96c17.7 0 32-14.3 32-32V352z" />
        </svg>
      </label>
      <canvas id="canvas"></canvas>
      <!-- environment step -->
      <div class="step-item" id="select-environment">
        <h1 class="environment-header">Select Environment</h1>
        <div id="environment-list">
          <label for="wall-upload" class="environment-item environment-item-add">
            <input type="file" id="wall-upload" accept="image/png, image/jpeg" />
          </label>
        </div>
      </div>
      <!-- artwork step -->
      <div class="step-item" id="select-artwork" style="justify-content:center;">
        <h1 class="environment-header">Upload Artwork</h1>
        <div class="environment-list">
          <label for="artwork-upload" class="environment-item environment-item-add">
            <input type="file" id="artwork-upload" accept="image/png, image/jpeg" />
          </label>
        </div>
      </div>

    </div>
    <!-- selection pane -->
    <div class="selection-pane">
      <div class="selection-pane-item" type="artwork">
        <!-- experimental -->
        <div class="selection-list" style="margin: auto; width:auto;">
          <label for="artwork-file-upload" class="selection-item selection-item-add" style="min-width:70px;">
            <input type="file" id="artwork-file-upload" accept="image/png, image/jpeg" />
            <svg xmlns="http://www.w3.org/2000/svg" height="50" viewBox="0 0 448 512">
              <path fill="currentColor"
                d="M256 80c0-17.7-14.3-32-32-32s-32 14.3-32 32V224H48c-17.7 0-32 14.3-32 32s14.3 32 32 32H192V432c0 17.7 14.3 32 32 32s32-14.3 32-32V288H400c17.7 0 32-14.3 32-32s-14.3-32-32-32H256V80z" />
            </svg>
          </label>
          <div id="artwork-list" style="display:flex; gap:20px;">
          </div>
        </div>
        <!-- experimental -->
      </div>
      <div class="selection-pane-item" type="frame">
        <div id="frame-list" class="selection-list">
          <div id="add-frame-item-debug" class="selection-item">
            <label for="frame-file-upload" class="selection-item-add" style="cursor:pointer;">
              <input type="file" id="frame-file-upload" accept="image/png, image/jpeg" />
              <svg xmlns="http://www.w3.org/2000/svg" height="50" viewBox="0 0 448 512">
                <path fill="currentColor"
                  d="M256 80c0-17.7-14.3-32-32-32s-32 14.3-32 32V224H48c-17.7 0-32 14.3-32 32s14.3 32 32 32H192V432c0 17.7 14.3 32 32 32s32-14.3 32-32V288H400c17.7 0 32-14.3 32-32s-14.3-32-32-32H256V80z" />
              </svg>
            </label>
            <label for="frame-length"
              style="display:inline-flex; gap:10px; margin-right: 10px; align-items:center; margin-left:10px;">Length
              <input id="frame-length" type="number" min="0" value="5.6"
                style="width:70px; height:32px; text-align:center;" /></label>
            <label for="frame-offset"
              style="display:inline-flex; gap:10px; margin-right: 10px; align-items:center;">Offset
              <input id="frame-offset" type="number" min="0" value="0.8"
                style="width:50px; height:32px; text-align:center;" /></label>
          </div>
        </div>
      </div>
      <!--
      <div class="selection-pane-item" type="pass">
        <div id="pass-list" class="selection-list">
        </div>
      </div>
       -->
      <div class="selection-pane-item" id="selection-background-pane" type="background"
        style="gap:20px; width:100%; height:120px;">
        <div class="selection-list" style="margin: auto; width:auto;">
          <label id="add-artwork" class="selection-item selection-item-add"
            style="height:50px; min-width:50px; margin-left:20px;">
            <svg xmlns="http://www.w3.org/2000/svg" height="40" viewBox="0 0 448 512">
              <path fill="currentColor"
                d="M256 80c0-17.7-14.3-32-32-32s-32 14.3-32 32V224H48c-17.7 0-32 14.3-32 32s14.3 32 32 32H192V432c0 17.7 14.3 32 32 32s32-14.3 32-32V288H400c17.7 0 32-14.3 32-32s-14.3-32-32-32H256V80z" />
            </svg>
          </label>
          <div id="painting-list" style="display:flex; gap:20px;">
          </div>
        </div>
        <!--
        <label id="change-wall-size" class="selection-item selection-item-add"
          style="height:40px; min-width:40px; margin-right:20px;" alt="Fit to Screen">
          <svg height="30" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 448 512">
            <path fill="currentColor"
              d="M32 32C14.3 32 0 46.3 0 64v96c0 17.7 14.3 32 32 32s32-14.3 32-32V96h64c17.7 0 32-14.3 32-32s-14.3-32-32-32H32zM64 352c0-17.7-14.3-32-32-32s-32 14.3-32 32v96c0 17.7 14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H64V352zM320 32c-17.7 0-32 14.3-32 32s14.3 32 32 32h64v64c0 17.7 14.3 32 32 32s32-14.3 32-32V64c0-17.7-14.3-32-32-32H320zM448 352c0-17.7-14.3-32-32-32s-32 14.3-32 32v64H320c-17.7 0-32 14.3-32 32s14.3 32 32 32h96c17.7 0 32-14.3 32-32V352z" />
          </svg>
        </label>
      -->
      </div>
      <div class="selection-pane-item" type="scale">
        <label for="wall-size" style="display:inline-flex; gap:10px; margin-right: 10px; align-items:center;">Length
          <input id="wall-size" type="number" min="0" value="300"
            style="width:70px; height:32px; text-align:center;" />cm</label>
        <button id="scale-confirm">Confirm</button>
      </div>
      <div class="selection-pane-item" type="glass">
        <div style="display:flex; align-items:center; gap:20px; margin: auto; overflow:auto;">
          <label class="radio">
            <input name="radio" type="radio" checked>
            <span>Plexiglass</span>
          </label>
          <label class="radio">
            <input name="radio" type="radio">
            <span>No glass</span>
          </label>
          <label class="radio">
            <input name="radio" type="radio">
            <span>Museum glass</span>
          </label>
        </div>
      </div>
      <div class="selection-pane-item" type="back">
        <div style="display:flex; align-items:center; gap:20px; margin: auto; overflow:auto;">
          <label class="radio">
            <input name="back-radio" type="radio" checked>
            <span>Cardboard</span>
          </label>
          <label class="radio">
            <input name="back-radio" type="radio">
            <span>PFL</span>
          </label>
          <label class="radio">
            <input name="back-radio" type="radio">
            <span>MDF</span>
          </label>
        </div>
      </div>
    </div>
    <!-- bottom pane -->
    <div class="bottom-pane">
      <div id="painting-options">
        <div type="artwork" class="painting-options-item painting-options-item-menu"><svg
            xmlns="http://www.w3.org/2000/svg" height="30" viewBox="0 0 512 512">
            <path fill="currentColor"
              d="M448 80c8.8 0 16 7.2 16 16V415.8l-5-6.5-136-176c-4.5-5.9-11.6-9.3-19-9.3s-14.4 3.4-19 9.3L202 340.7l-30.5-42.7C167 291.7 159.8 288 152 288s-15 3.7-19.5 10.1l-80 112L48 416.3l0-.3V96c0-8.8 7.2-16 16-16H448zM64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64zm80 192a48 48 0 1 0 0-96 48 48 0 1 0 0 96z" />
          </svg>
          <span>Artwork</span>
        </div>
        <div type="frame" class="painting-options-item painting-options-item-menu">
          <svg xmlns="http://www.w3.org/2000/svg" height="30" viewBox="0 0 37 28">
            <path
              d="M36.729,13.773v.51c-.008.07-.019.14-.027.209-.021.231-.03.464-.064.692-.161,1.057-.335,2.114-.488,3.171a7.493,7.493,0,0,0-.123,1.358c.027.671.118,1.341.207,2.01.115.867.26,1.728.389,2.592.04.268.072.537.107.8V25.5c-.011.07-.024.14-.032.209a2.838,2.838,0,0,1-2.192,2.372c-.134.03-.268.051-.405.078h-.456c-.22-.032-.443-.051-.66-.1-.636-.137-1.269-.29-1.9-.424a5.063,5.063,0,0,0-1.564-.177c-.829.089-1.653.217-2.479.335-.63.091-1.261.193-1.891.282-.26.038-.523.054-.783.08h-.724c-.056-.008-.113-.021-.172-.027-.25-.021-.5-.027-.746-.067-.867-.137-1.733-.287-2.6-.432a9.765,9.765,0,0,0-2-.18,16.558,16.558,0,0,0-2.12.287c-.711.121-1.425.231-2.141.338-.255.038-.512.054-.77.078h-.724c-.062-.008-.123-.021-.185-.027-.244-.021-.491-.027-.732-.064-1.036-.158-2.071-.319-3.1-.491a6.191,6.191,0,0,0-2.433.008q-1.014.233-2.036.448c-.26.054-.529.083-.791.123H2.629a.7.7,0,0,0-.1-.024A2.826,2.826,0,0,1,.11,26.051C.064,25.882.035,25.7,0,25.525V25.1c.013-.1.021-.2.038-.3C.225,23.5.424,22.206.6,20.91a6.535,6.535,0,0,0,.094-1.387C.625,18.656.483,17.8.362,16.934.274,16.306.169,15.681.08,15.053c-.038-.247-.054-.5-.08-.743v-.563c.013-.131.019-.266.038-.4.142-.971.292-1.942.432-2.914C.553,9.856.641,9.28.692,8.7A9.7,9.7,0,0,0,.52,6.524C.4,5.666.26,4.81.134,3.954.086,3.624.046,3.291,0,2.961v-.4c.008-.043.021-.086.027-.129A2.782,2.782,0,0,1,1.9.069,5.393,5.393,0,0,1,2.6-.1h.51c.158.021.319.035.475.07.644.14,1.285.29,1.932.424A5.508,5.508,0,0,0,7.2.6C8.035.512,8.864.38,9.693.262c.622-.089,1.242-.19,1.865-.282.25-.035.5-.054.757-.08h.8c.123.011.25.016.37.035.891.134,1.779.274,2.672.408.612.091,1.226.2,1.84.25a10.726,10.726,0,0,0,2.71-.274C21.421.2,22.129.085,22.837-.022c.255-.038.512-.054.77-.078h.8c.048.008.094.021.142.027.319.032.641.046.958.094,1.022.156,2.044.325,3.067.488A5.516,5.516,0,0,0,30.655.5c.681-.15,1.366-.3,2.05-.445.3-.062.606-.1.91-.153h.51a.543.543,0,0,0,.089.024,2.817,2.817,0,0,1,2.407,2.082c.048.18.072.365.107.547v.376c-.013.118-.027.236-.046.354-.185,1.28-.384,2.557-.555,3.839A7.2,7.2,0,0,0,36.035,8.6c.067.842.209,1.68.327,2.519.089.63.193,1.261.284,1.891C36.689,13.269,36.705,13.521,36.729,13.773ZM32.474,23.91V4.152H4.247V23.91Z"
              transform="translate(1 0.1)" fill="currentColor" />
          </svg>
          <span>Frame</span>
        </div>
        <div type="pass" class="painting-options-item painting-options-item-menu"><svg
            xmlns="http://www.w3.org/2000/svg" height="30" viewBox="0 0 31.829 29">
            <path
              d="M3.177,28.505l2.042.853V15.6l-3.7,8.93a3.077,3.077,0,0,0,1.661,3.978Zm29.717-5.639L25.336,4.624a3.037,3.037,0,0,0-3.962-1.646L10.142,7.627A3.046,3.046,0,0,0,8.267,10.37,2.843,2.843,0,0,0,8.5,11.589l7.559,18.242a3.044,3.044,0,0,0,2.789,1.874,3.152,3.152,0,0,0,1.173-.229l11.216-4.648a3.039,3.039,0,0,0,1.661-3.962ZM11.33,11.894a1.524,1.524,0,1,1,1.524-1.524A1.528,1.528,0,0,1,11.33,11.894ZM8.282,28.658a3.057,3.057,0,0,0,3.048,3.048h2.21L8.282,19Z"
              transform="translate(-1.295 -2.75)" fill="currentColor" />
          </svg>
          <span>Mat</span>
        </div>
        <div type="glass" class="painting-options-item painting-options-item-menu"><svg
            xmlns="http://www.w3.org/2000/svg" height="30" viewBox="0 0 38 28">
            <g>
              <g fill="none" stroke="currentColor" stroke-width="2">
                <rect width="37.175" height="27.881" stroke="none" />
                <rect x="1" y="1" width="35.175" height="25.881" fill="none" />
              </g>
              <g transform="translate(10.068 8.519)">
                <line x1="7.745" y2="7.745" transform="translate(6.196 3.098)" fill="none" stroke="currentColor"
                  stroke-width="2" />
                <line x1="4.647" y2="4.647" fill="none" stroke="currentColor" stroke-width="2" />
                <line x1="10.843" y2="10.843" fill="none" stroke="currentColor" stroke-width="2" />
              </g>
            </g>
          </svg>
          <span>Glass</span>
        </div>
        <div type="back" class="painting-options-item painting-options-item-menu">
          <svg xmlns="http://www.w3.org/2000/svg" height="30" viewBox="0 0 38 28">
            <g>
              <g fill="none" stroke="currentColor" stroke-width="2">
                <rect width="37.175" height="27.881" stroke="none" />
                <rect x="1" y="1" width="35.175" height="25.881" fill="currentColor" />
              </g>
            </g>
          </svg>
          <span>Back</span>
        </div>
      </div>
      <button id="checkout" style="display: none; margin-right:20px; background-color: #037171;">
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 576 512">
          <path fill="currentColor"
            d="M0 24C0 10.7 10.7 0 24 0H69.5c22 0 41.5 12.8 50.6 32h411c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3H170.7l5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5H488c13.3 0 24 10.7 24 24s-10.7 24-24 24H199.7c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5H24C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z" />
        </svg>
        CHECKOUT</button>
    </div>
  </div>
  <script src="paper.js"></script>
  <script src="frame.js"></script>
  <script src="artwork.js"></script>
  <script src="main.js"></script>
</body>

</html>
